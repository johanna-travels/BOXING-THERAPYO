<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <rect width="800" height="1000" fill="#000"/>

  <text x="400" y="56" text-anchor="middle" fill="#fff" fill-opacity="0.4" font-family="Oswald, system-ui, sans-serif" font-size="14" letter-spacing="0.3em">UI STRUCTURE</text>

  <!-- BODY -->
  <rect x="80" y="88" width="640" height="820" stroke="#fff" stroke-opacity="0.25" stroke-width="2"/>
  <text x="104" y="116" fill="#fff" fill-opacity="0.5" font-family="Oswald, system-ui, sans-serif" font-size="12" letter-spacing="0.2em">BODY</text>

  <!-- HEADER -->
  <rect x="104" y="136" width="592" height="64" fill="#141414" stroke="#fff" stroke-opacity="0.3"/>
  <text x="128" y="176" fill="#fff" font-family="Oswald, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0.1em">HEADER</text>
  <rect x="620" y="156" width="52" height="24" rx="12" stroke="#fff" stroke-width="1.5"/>
  <circle cx="634" cy="168" r="8" fill="#fff"/>

  <!-- NAV -->
  <rect x="104" y="216" width="592" height="180" fill="#0F151A" stroke="#fff" stroke-opacity="0.15"/>
  <text x="128" y="252" fill="#fff" fill-opacity="0.7" font-family="Oswald, system-ui, sans-serif" font-size="16" letter-spacing="0.15em">NAV</text>
  <line x1="128" y1="276" x2="672" y2="276" stroke="#fff" stroke-opacity="0.1"/>
  <text x="128" y="304" fill="#fff" fill-opacity="0.45" font-family="Bebas Neue, system-ui, sans-serif" font-size="14" letter-spacing="0.12em">services  work  about  contact</text>
  <text x="128" y="368" fill="#fff" fill-opacity="0.3" font-family="Bebas Neue, system-ui, sans-serif" font-size="11" letter-spacing="0.1em">overlay menu</text>

  <!-- SECTIONS -->
  <g transform="translate(104, 412)">
    <rect x="0" y="0" width="592" height="88" fill="#000" stroke="#fff" stroke-opacity="0.12"/>
    <text x="296" y="52" text-anchor="middle" fill="#fff" font-family="Oswald, system-ui, sans-serif" font-size="16" letter-spacing="0.2em">SECTION</text>

    <rect x="0" y="96" width="592" height="88" fill="#141414" stroke="#fff" stroke-opacity="0.12"/>
    <text x="296" y="148" text-anchor="middle" fill="#fff" font-family="Oswald, system-ui, sans-serif" font-size="16" letter-spacing="0.2em">SECTION</text>

    <rect x="0" y="192" width="592" height="88" fill="#000" stroke="#fff" stroke-opacity="0.12"/>
    <text x="296" y="244" text-anchor="middle" fill="#fff" font-family="Oswald, system-ui, sans-serif" font-size="16" letter-spacing="0.2em">SECTION</text>

    <rect x="0" y="288" width="592" height="88" fill="#141414" stroke="#fff" stroke-opacity="0.12"/>
    <text x="296" y="340" text-anchor="middle" fill="#fff" font-family="Oswald, system-ui, sans-serif" font-size="16" letter-spacing="0.2em">SECTION</text>

    <rect x="0" y="384" width="592" height="88" fill="#000" stroke="#fff" stroke-opacity="0.12"/>
    <text x="296" y="436" text-anchor="middle" fill="#fff" font-family="Oswald, system-ui, sans-serif" font-size="16" letter-spacing="0.2em">SECTION</text>
  </g>

  <!-- simple flow -->
  <text x="400" y="960" text-anchor="middle" fill="#fff" fill-opacity="0.25" font-family="Bebas Neue, system-ui, sans-serif" font-size="13" letter-spacing="0.15em">body = header + nav + sections</text>
</svg>
